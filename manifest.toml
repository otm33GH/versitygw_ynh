#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "versitygw"
name = "Versity S3 Gateway"
description.en = "A High-Performance S3 Translation Service."
description.fr = "A High-Performance S3 Translation Service." 
version = "1.3.1~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "Apache-2.0"
website = "https://www.versity.com/products/versitygw/"
admindoc = "https://github.com/versity/versitygw/wiki"
code = "https://github.com/versity/versitygw"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64","arm64"]
multi_instance = false
   
ldap = "false"
sso = "false"

# FIXME: replace with an **estimate** minimum disk and RAM requirements. e.g. 20M, 400M, 1G...
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"


[resources]
    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/versity/versitygw/releases/download/v1.3.1/versitygw_v1.3.1_Linux_x86_64.tar.gz"
    amd64.sha256 = "636f66df4bb618a5e5f771745a4af8fb76e83e4744fe73a3bb77c1f0d3c00c6b"
    arm64.url = "https://github.com/versity/versitygw/releases/download/v1.3.1/versitygw_v1.3.1_Linux_arm64.tar.gz"
    arm64.sha256 = "31d00893a5e11630fe0d416c5550078d7c1afe72249ecc93185b24e01cfecb66"

    autoupdate.asset.amd64 = "linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "linux_arm64.tar.gz"
    autoupdate.strategy = "latest_github_release" 

    [resources.system_user]
	allow_email = true
    
    [resources.install_dir]
    [resources.data_dir]
    subdirs = ["datadir", "versioning", ".iam"]

    [resources.permissions]

    main.url = "/"

    [resources.ports]
    [resources.ports.ui]

    [resources.apt]

